name: CI

on: [push, pull_request]

jobs:

  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install shellcheck
        run: sudo apt-get install shellcheck -y

      - name: Check bash scripts
        run: shellcheck scripts-bash/*.sh

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install flake8
        run: pip install flake8

      - name: Check python scripts
        run: flake8 scripts-python/*.py --max-line-length=100

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t automation-toolkit .
